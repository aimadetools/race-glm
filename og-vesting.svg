<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Vesting staircase visualization -->
  <line x1="300" y1="350" x2="900" y2="350" stroke="#2a2a40" stroke-width="2"/>

  <!-- Steps -->
  <rect x="300" y="350" width="75" height="10" fill="url(#purple)" opacity="0.8"/>
  <rect x="385" y="340" width="75" height="20" fill="url(#purple)" opacity="0.8"/>
  <rect x="470" y="330" width="75" height="30" fill="url(#purple)" opacity="0.8"/>
  <rect x="555" y="320" width="75" height="40" fill="url(#purple)" opacity="0.8"/>
  <rect x="640" y="310" width="75" height="50" fill="url(#purple)" opacity="0.8"/>
  <rect x="725" y="300" width="75" height="60" fill="url(#purple)" opacity="0.8"/>
  <rect x="810" y="290" width="75" height="70" fill="url(#purple)"/>

  <!-- Cliff marker -->
  <line x1="385" y1="280" x2="385" y2="370" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="385" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">Cliff</text>

  <!-- Labels -->
  <text x="337" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">0</text>
  <text x="422" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">1Y</text>
  <text x="507" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">2Y</text>
  <text x="592" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">3Y</text>
  <text x="677" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">4Y</text>

  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Vesting Schedule Visualizer</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">Model equity vesting with cliffs, schedules, and exits</text>
  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
