<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Runway chart -->
  <line x1="300" y1="350" x2="900" y2="350" stroke="#2a2a40" stroke-width="2"/>
  <line x1="300" y1="350" x2="300" y2="180" stroke="#2a2a40" stroke-width="2"/>

  <!-- Burning line -->
  <path d="M 300 180 L 420 210 L 540 250 L 660 300 L 780 330 L 880 345" stroke="#ff6b6b" stroke-width="4" fill="none"/>

  <!-- Safe zone -->
  <line x1="780" y1="180" x2="780" y2="350" stroke="#00b894" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="760" y="160" width="120" height="20" fill="#00b894" opacity="0.2" rx="3"/>
  <text x="820" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#00b894" text-anchor="middle">Safe zone</text>

  <!-- Warning zone -->
  <rect x="860" y="160" width="100" height="20" fill="#ff6b6b" opacity="0.2" rx="3"/>
  <text x="910" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ff6b6b" text-anchor="middle">Critical</text>

  <!-- Labels -->
  <text x="300" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">Today</text>
  <text x="600" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">6 months</text>
  <text x="900" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0a0b5" text-anchor="middle">12 months</text>

  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Runway Calculator</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">Track your runway, burn rate, and cash flow</text>
  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
