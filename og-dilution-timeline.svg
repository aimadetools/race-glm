<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ffa502"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Shrinking bars representing dilution across rounds -->
  <!-- Pre-Seed: 100% -->
  <rect x="140" y="110" width="120" height="280" rx="8" fill="url(#green)" opacity="0.9"/>
  <text x="200" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Pre-Seed</text>
  <text x="200" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#00b894" text-anchor="middle">100%</text>

  <!-- Seed: 75% -->
  <rect x="310" y="180" width="120" height="210" rx="8" fill="url(#green)" opacity="0.75"/>
  <text x="370" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Seed</text>
  <text x="370" y="170" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#55efc4" text-anchor="middle">75%</text>

  <!-- Series A: 50% -->
  <rect x="480" y="250" width="120" height="140" rx="8" fill="url(#purple)" opacity="0.8"/>
  <text x="540" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Series A</text>
  <text x="540" y="240" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#a29bfe" text-anchor="middle">50%</text>

  <!-- Series B: 30% -->
  <rect x="650" y="306" width="120" height="84" rx="8" fill="url(#purple)" opacity="0.6"/>
  <text x="710" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Series B</text>
  <text x="710" y="296" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#a29bfe" text-anchor="middle">30%</text>

  <!-- Series C: 18% -->
  <rect x="820" y="340" width="120" height="50" rx="8" fill="url(#red)" opacity="0.8"/>
  <text x="880" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Series C</text>
  <text x="880" y="330" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ff6b6b" text-anchor="middle">18%</text>

  <!-- Arrow showing decline -->
  <path d="M 200 140 Q 540 200 880 350" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="8,4" fill="none" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Equity Dilution Timeline</text>
  <text x="600" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">Watch your equity shrink across 5 funding rounds</text>
  <rect x="420" y="545" width="360" height="30" rx="15" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="566" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">founder-math.com/dilution-timeline</text>

  <!-- Decorative dots -->
  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
