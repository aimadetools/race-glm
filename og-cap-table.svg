<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Cap table visualization -->
  <rect x="350" y="160" width="500" height="220" rx="10" fill="url(#purple)" opacity="0.1"/>
  <rect x="370" y="180" width="180" height="40" rx="5" fill="url(#purple)" opacity="0.6"/>
  <text x="460" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle">Founders</text>
  <text x="460" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a29bfe" text-anchor="middle">65%</text>

  <rect x="570" y="180" width="120" height="40" rx="5" fill="#00b894" opacity="0.7"/>
  <text x="630" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle">Investors</text>
  <text x="630" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#55efc4" text-anchor="middle">25%</text>

  <rect x="710" y="180" width="120" height="40" rx="5" fill="#ffa502" opacity="0.7"/>
  <text x="770" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle">Options</text>
  <text x="770" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#feca57" text-anchor="middle">10%</text>

  <!-- Waterfall arrows -->
  <path d="M 420 280 L 420 320 L 480 320 L 480 350" stroke="#6c5ce7" stroke-width="2" fill="none"/>
  <path d="M 520 280 L 520 320 L 560 320 L 560 350" stroke="#6c5ce7" stroke-width="2" fill="none"/>

  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Cap Table Builder</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">Full cap table management with waterfall exit analysis</text>
  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
