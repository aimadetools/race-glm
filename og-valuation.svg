<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e17055"/>
      <stop offset="100%" style="stop-color:#fab1a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Valuation chart visualization -->
  <rect x="150" y="150" width="180" height="180" rx="10" fill="#2a2a40" stroke="#6c5ce7" stroke-width="2"/>
  <text x="240" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle">Berkus</text>
  <text x="240" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#6c5ce7" text-anchor="middle">$2.5M</text>
  <text x="240" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#636e72" text-anchor="middle">Pre-revenue</text>

  <rect x="510" y="150" width="180" height="180" rx="10" fill="#2a2a40" stroke="#00b894" stroke-width="2"/>
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#55efc4" text-anchor="middle">Scorecard</text>
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#00b894" text-anchor="middle">$4.2M</text>
  <text x="600" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#636e72" text-anchor="middle">Early stage</text>

  <rect x="870" y="150" width="180" height="180" rx="10" fill="#2a2a40" stroke="#e17055" stroke-width="2"/>
  <text x="960" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fab1a0" text-anchor="middle">VC Method</text>
  <text x="960" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#e17055" text-anchor="middle">$8.0M</text>
  <text x="960" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#636e72" text-anchor="middle">Fundraising</text>

  <!-- Three method badges -->
  <circle cx="450" cy="240" r="8" fill="#6c5ce7"/>
  <circle cx="810" cy="240" r="8" fill="#00b894"/>

  <!-- Tagline -->
  <text x="600" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a29bfe" text-anchor="middle">3 proven valuation methods. Instant results.</text>

  <!-- Main title -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">Startup Valuation Calculator</text>
  <text x="600" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a29bfe" text-anchor="middle">Know what your startup is worth before you pitch</text>

  <rect x="420" y="520" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com/valuation</text>

  <!-- Decorative elements -->
  <circle cx="150" cy="100" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="100" r="4" fill="#00b894"/>
  <circle cx="1080" cy="550" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="520" r="5" fill="#00b894" opacity="0.5"/>
</svg>
