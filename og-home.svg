<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Calculator icons showcase -->
  <circle cx="300" cy="200" r="50" fill="url(#purple)" opacity="0.6" filter="url(#glow)"/>
  <text x="300" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="white" text-anchor="middle">%</text>

  <circle cx="440" cy="200" r="50" fill="#00b894" opacity="0.6" filter="url(#glow)"/>
  <text x="440" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">$</text>

  <circle cx="580" cy="200" r="50" fill="url(#purple)" opacity="0.6" filter="url(#glow)"/>
  <text x="580" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="white" text-anchor="middle">S</text>

  <circle cx="720" cy="200" r="50" fill="#ffa502" opacity="0.6" filter="url(#glow)"/>
  <text x="720" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" text-anchor="middle">V</text>

  <circle cx="860" cy="200" r="50" fill="#ff6b6b" opacity="0.6" filter="url(#glow)"/>
  <text x="860" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="white" text-anchor="middle">R</text>

  <rect x="1000" y="160" width="100" height="80" rx="10" fill="#54a0ff" opacity="0.6" filter="url(#glow)"/>
  <text x="1050" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="white" text-anchor="middle">LTV</text>

  <!-- Tagline -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#a29bfe" text-anchor="middle">6 Free Calculators for Founders</text>

  <!-- Sub-calculators list -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">
    <text x="230" y="365">Dilution</text>
    <text x="370" y="365">SAFE</text>
    <text x="510" y="365">Cap Table</text>
    <text x="650" y="365">Vesting</text>
    <text x="790" y="365">Runway</text>
    <text x="930" y="365">Unit Eco</text>
  </g>

  <!-- Main title -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">FounderMath</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a29bfe" text-anchor="middle">The startup calculator suite founders actually need</text>

  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
