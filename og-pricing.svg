<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Free card -->
  <rect x="280" y="160" width="250" height="220" rx="15" fill="url(#purple)" opacity="0.15"/>
  <text x="405" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Free</text>
  <text x="405" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="bold" fill="#a29bfe" text-anchor="middle">$0</text>
  <text x="405" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">6 Calculators</text>
  <text x="405" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Basic Features</text>

  <!-- Pro card with glow -->
  <rect x="670" y="140" width="280" height="260" rx="15" fill="url(#green)" opacity="0.15" stroke="url(#green)" stroke-width="2"/>
  <rect x="670" y="140" width="280" height="40" rx="15" fill="url(#green)" opacity="0.5"/>
  <text x="810" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PRO</text>
  <text x="810" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#55efc4" text-anchor="middle">$9/mo</text>
  <text x="810" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Unlimited Scenarios</text>
  <text x="810" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">PDF Export</text>
  <text x="810" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Compare Scenarios</text>
  <text x="810" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0a0b5" text-anchor="middle">Priority Support</text>

  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">FounderMath Pricing</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">Free forever. Pro for serious founders.</text>
  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
