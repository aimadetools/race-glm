<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#purple)" stroke-width="2"/>

  <!-- Blog posts visualization -->
  <rect x="300" y="160" width="600" height="60" rx="8" fill="url(#purple)" opacity="0.2"/>
  <rect x="310" y="170" width="40" height="40" rx="4" fill="url(#purple)" opacity="0.6"/>
  <text x="320" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white">%</text>
  <text x="370" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a29bfe">Equity Dilution Guide</text>

  <rect x="300" y="230" width="600" height="60" rx="8" fill="#00b894" opacity="0.2"/>
  <rect x="310" y="240" width="40" height="40" rx="4" fill="#00b894" opacity="0.6"/>
  <text x="320" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white">$</text>
  <text x="370" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#55efc4">SAFE Notes Explained</text>

  <rect x="300" y="300" width="600" height="60" rx="8" fill="url(#purple)" opacity="0.2"/>
  <rect x="310" y="310" width="40" height="40" rx="4" fill="url(#purple)" opacity="0.6"/>
  <text x="320" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white">V</text>
  <text x="370" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a29bfe">Vesting Schedules Guide</text>

  <rect x="300" y="370" width="600" height="60" rx="8" fill="#ffa502" opacity="0.2"/>
  <rect x="310" y="380" width="40" height="40" rx="4" fill="#ffa502" opacity="0.6"/>
  <text x="320" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white">C</text>
  <text x="370" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#feca57">CAC/LTV Ratio Guide</text>

  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">FounderMath Blog</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a29bfe" text-anchor="middle">17+ guides on startup equity, funding, and metrics</text>
  <rect x="420" y="500" width="360" height="45" rx="22.5" fill="url(#green)" filter="url(#glow)"/>
  <text x="600" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">founder-math.com</text>

  <circle cx="150" cy="120" r="6" fill="#6c5ce7"/>
  <circle cx="1050" cy="510" r="4" fill="#00b894"/>
  <circle cx="1080" cy="480" r="3" fill="#6c5ce7"/>
  <circle cx="120" cy="500" r="5" fill="#00b894" opacity="0.5"/>
</svg>
